<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listening — IELTS Practice · 90 Practices</title>
<style>
:root{
  --forest:#013220;--moss:#006D6F;--teal:#007A74;--mint:#D8BFD8;--sage:#F5F5DC;
  --sand:#FFFAF0;--shell:#FFF5EE;--white:#FFFAFA;
  --blue:#2563EB;--blue-light:#EFF6FF;--amber:#D97706;--amber-light:#FFFBEB;
  --red:#DC2626;--red-light:#FEF2F2;--green-success:#16A34A;--green-light:#F0FDF4;
  --text-dark:#013220;--text-mid:#006D6F;--text-soft:#5F8A80;
  --border:#E3DED0;--shadow-sm:0 1px 3px rgba(1,50,32,.08);--shadow-md:0 4px 16px rgba(1,50,32,.12);
  --shadow-lg:0 8px 32px rgba(1,50,32,.16);--radius:12px;--radius-sm:8px;--radius-lg:20px;font-size:16px;
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:var(--text-dark);line-height:1.6;background:var(--sand);}
.app-shell{display:flex;}
/* ---- Sidebar ---- */
.sidebar{width:220px;position:fixed;top:0;left:0;height:100vh;background:var(--forest);color:#fff;
  overflow-y:auto;display:flex;flex-direction:column;z-index:100;}
.brand{padding:20px 18px 14px;border-bottom:1px solid rgba(255,255,255,.08);}
.brand .badge-mint{display:inline-block;background:rgba(216,191,216,.2);color:var(--mint);
  border:1px solid rgba(216,191,216,.3);border-radius:99px;padding:3px 10px;font-size:10px;font-weight:800;letter-spacing:.5px;}
.brand h1{font-size:16px;font-weight:800;margin:10px 0 3px;color:#fff;}
.brand .sub{font-size:10px;color:var(--mint);opacity:.8;letter-spacing:.5px;}
.nav{flex:1;padding:8px 0 90px;}
.nav-home{display:flex;align-items:center;gap:8px;padding:10px 18px;font-size:13px;color:rgba(255,255,255,.75);
  cursor:pointer;border-left:3px solid transparent;}
.nav-home:hover{background:rgba(216,191,216,.08);}
.nav-home.active{background:rgba(216,191,216,.15);border-left-color:var(--mint);color:#fff;}
.nav-group-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;
  color:rgba(216,191,216,.6);padding:14px 18px 5px;}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 18px 8px 26px;font-size:13px;font-weight:500;
  color:rgba(255,255,255,.7);cursor:pointer;border-left:3px solid transparent;}
.nav-item:hover{background:rgba(216,191,216,.08);color:#fff;}
.nav-item.active{background:rgba(216,191,216,.15);border-left-color:var(--mint);color:#fff;}
.nav-item .idx{width:18px;height:18px;border-radius:99px;background:rgba(255,255,255,.1);font-size:10px;font-weight:800;
  display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto;}
.nav-item .done{margin-left:auto;color:var(--mint);font-weight:800;}
.progress-wrap{position:fixed;bottom:0;left:0;width:220px;background:var(--forest);padding:12px 18px 14px;
  border-top:1px solid rgba(255,255,255,.08);}
.progress-track{height:6px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;background:var(--mint);width:0;transition:width .3s;}
.progress-label{font-size:11px;color:rgba(255,255,255,.7);margin-top:6px;}
/* ---- Main ---- */
.main-content{margin-left:220px;flex:1;min-height:100vh;width:calc(100% - 220px);}
.page{display:none;}
.page.active{display:block;animation:fadeIn .3s ease;}
/* ---- Overview ---- */
.hero{background:linear-gradient(135deg,var(--forest),var(--moss),var(--teal));color:#fff;padding:40px 48px;}
.hero h2{margin:0 0 8px;font-size:32px;font-weight:800;}
.hero p{margin:4px 0;opacity:.9;font-size:14px;}
.hero .stats{margin-top:14px;display:flex;gap:22px;flex-wrap:wrap;font-size:13px;}
.hero .stats b{font-size:20px;display:block;color:var(--mint);}
.type-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;padding:32px 48px;}
.type-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow-sm);transition:all .2s;}
.type-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
.type-card .th{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.type-card .tnum{background:var(--sage);color:var(--forest);border-radius:99px;width:26px;height:26px;font-size:12px;font-weight:800;
  display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto;}
.type-card .tname{font-size:15px;font-weight:800;color:var(--forest);}
.pchip{display:flex;align-items:center;justify-content:space-between;background:var(--shell);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:6px 12px;font-size:13px;margin-bottom:5px;cursor:pointer;color:var(--text-dark);}
.pchip:hover{border-color:var(--teal);}
.pchip.done{background:var(--green-light);}
.pchip .st{font-size:11px;color:var(--text-soft);}
.pchip.done .st{color:var(--green-success);font-weight:700;}
.type-card .tcount{font-size:11px;color:var(--text-soft);margin-top:8px;}
/* ---- Practice header ---- */
.p-header{background:linear-gradient(135deg,var(--forest),var(--moss),var(--teal));color:#fff;
  padding:14px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:20;}
.p-header .badge-mint{background:rgba(216,191,216,.2);color:var(--mint);border:1px solid rgba(216,191,216,.3);
  border-radius:99px;padding:3px 11px;font-size:10px;font-weight:800;letter-spacing:.4px;}
.p-header .ptitle{font-size:18px;font-weight:800;}
.p-header .spacer{flex:1;}
.timer-chip{background:rgba(255,255,255,.15);color:#fff;border-radius:99px;padding:6px 16px;
  font-size:14px;font-weight:800;letter-spacing:1px;display:none;}
.timer-chip.show{display:inline-block;}
.timer-chip.warn{background:var(--amber);}
.score-chip{background:rgba(255,255,255,.15);color:#fff;border-radius:99px;padding:6px 16px;font-size:14px;font-weight:800;display:none;}
.score-chip.show{display:inline-block;}
.btn{padding:10px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;border:none;transition:all .15s;}
.btn-sm{padding:6px 14px;font-size:13px;}
.btn-primary{background:var(--forest);color:#fff;}
.btn-primary:hover{background:var(--moss);transform:translateY(-1px);}
.btn-outline{background:transparent;color:var(--forest);border:1.5px solid var(--border);}
.btn-finish{background:var(--mint);color:var(--forest);}
.btn-finish:disabled{opacity:.5;cursor:default;}
/* ---- Multi-bài practice ---- */
.phead-count{font-size:12px;font-weight:700;color:var(--mint);}
.bai-tabs{display:flex;gap:6px;padding:12px 24px;background:var(--sand);border-bottom:1px solid var(--border);flex-wrap:wrap;position:sticky;top:58px;z-index:19;}
.bai-tab{background:var(--white);border:1.5px solid var(--border);border-radius:99px;padding:7px 16px;
  font-size:13px;font-weight:800;color:var(--text-mid);cursor:pointer;font-family:inherit;transition:all .15s;}
.bai-tab:hover{border-color:var(--teal);}
.bai-tab.active{background:var(--forest);border-color:var(--forest);color:#fff;}
.bai-block{display:none;}
.bai-block.active{display:block;animation:fadeIn .25s;}
.bai-bar{display:flex;align-items:center;gap:12px;padding:10px 24px;background:var(--white);border-bottom:1px solid var(--border);}
.bai-bar .spacer{flex:1;}
.bai-title{font-size:14px;font-weight:800;color:var(--forest);}
.bai-bar .timer-chip{background:var(--sage);color:var(--forest);}
.bai-bar .timer-chip.warn{background:var(--amber);color:#fff;}
.bai-bar .score-chip.dark{background:var(--sage);color:var(--forest);}
.bai-block .workspace,.bai-block .start-gate{height:calc(100vh - 160px);}
/* ---- Notice / Start gate ---- */
.notice-bar{display:none;background:var(--amber-light);border-bottom:1px solid #FDE68A;padding:10px 24px;
  align-items:center;gap:12px;font-size:13px;color:var(--amber);}
.notice-bar.show{display:flex;}
.start-gate{display:flex;align-items:center;justify-content:center;height:calc(100vh - 58px);}
.start-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);
  box-shadow:var(--shadow-md);padding:48px 56px;text-align:center;max-width:440px;}
.start-card .big{font-size:44px;}
.start-card h3{margin:10px 0 6px;font-size:22px;font-weight:800;color:var(--forest);}
.start-card p{margin:0 0 6px;font-size:14px;color:var(--text-soft);}
.start-card .meta{font-size:13px;color:var(--text-mid);font-weight:700;margin-bottom:18px;}
/* ---- Workspace 60/40 ---- */
.workspace{display:grid;grid-template-columns:60fr 40fr;height:calc(100vh - 58px);}
.workspace>*{overflow-y:auto;padding:24px;}
.col-work{border-right:1px solid var(--border);background:var(--sand);}
.col-assist{background:var(--shell);}
.col-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.col-head h3{margin:0;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--text-mid);}
/* questions */
.q-group-instruction{background:var(--shell);border-left:4px solid var(--moss);border-radius:0 var(--radius-sm) var(--radius-sm) 0;
  padding:12px 16px;font-size:13px;font-weight:600;color:var(--text-mid);margin:18px 0 12px;}
.options-box{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:12px 16px;margin-bottom:12px;font-size:13.5px;line-height:1.9;}
.body-block{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px 24px;margin-bottom:16px;box-shadow:var(--shadow-sm);font-size:14px;line-height:2.1;}
.body-block table{border-collapse:collapse;width:100%;}
.body-block td,.body-block th{border:1px solid var(--border);padding:8px 12px;text-align:left;}
.blank-num{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;
  background:var(--forest);color:#fff;border-radius:99px;font-size:10px;font-weight:800;margin-right:4px;vertical-align:middle;}
.q-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm);}
.q-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.q-num{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;background:var(--forest);color:#fff;
  border-radius:99px;font-size:13px;font-weight:800;flex:0 0 auto;}
.q-type-chip{font-size:10px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;background:var(--sage);color:var(--forest);
  border-radius:99px;padding:2px 9px;}
.q-prompt{font-size:14px;margin-bottom:10px;}
.q-dropdown{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;background:var(--white);}
.q-dropdown:focus{border-color:var(--teal);outline:none;}
.q-dropdown.correct{border-color:var(--green-success);background:var(--green-light);}
.q-dropdown.incorrect{border-color:var(--red);background:var(--red-light);}
.blank-input{border:none;border-bottom:2px solid var(--border);background:transparent;font-size:14px;font-family:inherit;padding:6px 8px;width:100%;}
.blank-input:focus{border-bottom-color:var(--teal);outline:none;}
.blank-input.correct{border-bottom-color:var(--green-success);background:var(--green-light);}
.blank-input.incorrect{border-bottom-color:var(--red);background:var(--red-light);}
.blank-input.inline{width:150px;display:inline-block;text-align:center;}
.mcq-option{border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;font-size:14px;cursor:pointer;margin-bottom:8px;transition:all .15s;}
.mcq-option:hover{border-color:var(--teal);background:var(--sage);}
.mcq-option.selected{border-color:var(--blue);background:var(--blue-light);}
.mcq-option.correct{border-color:var(--green-success);background:var(--green-light);}
.mcq-option.incorrect{border-color:var(--red);background:var(--red-light);}
/* map labelling */
.map-wrap{position:relative;background:var(--white);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;margin-bottom:14px;}
.map-wrap img{display:block;width:100%;}
.map-zone{position:absolute;transform:translate(-50%,-50%);min-width:84px;padding:6px 10px;
  background:var(--white);border:2px dashed var(--teal);border-radius:var(--radius-sm);
  font-size:12px;font-weight:700;text-align:center;cursor:pointer;color:var(--text-soft);}
.map-zone.filled{border-style:solid;color:var(--forest);background:var(--sage);}
.map-zone.correct{border-color:var(--green-success);background:var(--green-light);color:var(--green-success);}
.map-zone.incorrect{border-color:var(--red);background:var(--red-light);color:var(--red);}
.label-bank{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.label-chip{background:var(--white);border:1.5px solid var(--border);border-radius:99px;
  padding:6px 14px;font-size:13px;font-weight:700;cursor:grab;user-select:none;transition:all .15s;}
.label-chip:hover{border-color:var(--teal);background:var(--sage);}
.label-chip.selected{border-color:var(--blue);background:var(--blue-light);}
.label-chip.used{opacity:.35;pointer-events:none;}
/* learning assistant */
.tabbar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.tab-btn{background:transparent;border:1.5px solid var(--border);border-radius:99px;
  padding:6px 14px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;
  color:var(--text-mid);cursor:pointer;font-family:inherit;}
.tab-btn.active{background:var(--sage);border-color:var(--forest);color:var(--forest);}
.tab-pane{display:none;}
.tab-pane.active{display:block;animation:fadeIn .25s;}
.hint-note{font-size:12px;color:var(--text-soft);font-style:italic;margin-bottom:12px;line-height:1.5;}
.hint-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:8px;display:flex;gap:10px;font-size:13px;}
.hint-card .q-num{width:22px;height:22px;font-size:11px;}
.hint-listen{font-size:12px;font-weight:700;color:var(--text-mid);}
.hint-card ul{margin:4px 0 6px;padding-left:18px;font-size:13px;}
.hint-card li{margin-bottom:2px;}
.hint-chip{display:inline-block;background:var(--sage);color:var(--forest);border-radius:99px;padding:1px 8px;font-size:11px;font-weight:700;margin-top:2px;}
.assist-list .a-item{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:9px 12px;margin-bottom:7px;font-size:13px;}
.vocab-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:9px 12px;margin-bottom:7px;font-size:13.5px;}
.vocab-card .ipa{color:var(--text-soft);font-size:12px;margin-left:6px;}
.vocab-card .vi{color:var(--text-mid);font-size:12.5px;margin-top:2px;}
/* review cards */
.review-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;margin-bottom:12px;box-shadow:var(--shadow-sm);font-size:13.5px;}
.review-card.ok{border-left:4px solid var(--green-success);}
.review-card.bad{border-left:4px solid var(--red);}
.rv-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.rv-verdict{font-size:13px;font-weight:800;}
.rv-verdict.ok{color:var(--green-success);}
.rv-verdict.bad{color:var(--red);}
.rv-verdict.retrying{color:var(--blue);}
.rv-row{display:flex;gap:8px;margin-bottom:4px;}
.rv-lbl{font-size:11px;font-weight:800;text-transform:uppercase;color:var(--text-soft);min-width:92px;padding-top:2px;}
.rv-your{color:var(--red);font-weight:700;}
.rv-your.neutral{color:var(--text-dark);}
.rv-correct{color:var(--green-success);font-weight:800;}
.rv-en{margin-top:8px;}
.rv-vi{margin-top:6px;color:var(--text-mid);font-size:13px;background:var(--shell);
  border-left:3px solid var(--sage);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:6px 10px;}
.rv-trap{margin-top:8px;background:var(--amber-light);color:var(--amber);border-radius:var(--radius-sm);
  padding:7px 10px;font-size:12.5px;font-weight:600;}
.rv-retry{margin-top:10px;}
.xp-quote{background:var(--shell);border-left:3px solid var(--moss);border-radius:0 var(--radius-sm) var(--radius-sm) 0;
  padding:9px 12px;margin:8px 0 6px;font-style:italic;font-size:13px;}
/* transcript */
.transcript-sec{display:none;margin-top:28px;border-top:2px solid var(--border);padding-top:18px;}
.transcript-sec.revealed{display:block;animation:fadeIn .3s;}
.ts-turn{margin-bottom:14px;}
.ts-speaker{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--moss);}
.ts-en{font-size:14px;line-height:1.8;}
.ts-vi{display:none;font-size:13px;color:var(--text-mid);background:var(--white);border-left:3px solid var(--sage);
  border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:6px 10px;margin-top:4px;line-height:1.7;}
.ts-vi.show{display:block;}
.ev{}
.ev.flash{background:var(--amber-light);border-radius:3px;transition:background .3s;box-shadow:0 0 0 3px var(--amber-light);}
/* placeholder */
.placeholder-card{background:var(--white);border:2px dashed var(--border);border-radius:var(--radius);padding:48px;text-align:center;color:var(--text-soft);margin:40px auto;max-width:520px;}
.placeholder-card .big{font-size:40px;}
.placeholder-card b{color:var(--forest);display:block;margin:10px 0 6px;font-size:16px;}
/* reset fab */
.reset-fab{position:fixed;bottom:24px;right:24px;background:var(--red);color:#fff;border-radius:99px;padding:12px 20px;font-size:13px;font-weight:700;box-shadow:var(--shadow-lg);z-index:200;border:none;cursor:pointer;display:none;}
.reset-fab.show{display:block;}
/* assistant drawer (responsive) */
.assist-toggle{display:none;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@media (max-width:1280px){
  .workspace{grid-template-columns:1fr;}
  .col-assist{position:fixed;top:0;right:0;width:340px;height:100vh;box-shadow:var(--shadow-lg);transform:translateX(100%);transition:transform .25s;z-index:150;}
  .col-assist.open{transform:translateX(0);}
  .assist-toggle{display:block;position:fixed;right:0;bottom:80px;background:var(--forest);color:#fff;border:none;border-radius:var(--radius-sm) 0 0 var(--radius-sm);padding:12px 14px;font-size:13px;font-weight:700;cursor:pointer;z-index:151;}
}
@media (max-width:1024px){
  .workspace{height:auto;}
  .workspace>*{overflow:visible;}
  .col-work{border-right:none;}
  .start-gate{height:auto;padding:60px 20px;}
}
@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important;}}
</style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="brand">
      <span class="badge-mint">IELTS LISTENING</span>
      <h1>Listening Practice</h1>
      <div class="sub">90 PRACTICES · 6 QUESTION TYPES</div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-label" id="progressLabel">0 / 90 finished</div>
    </div>
  </aside>
  <main class="main-content" id="main"></main>
</div>
<button class="reset-fab" id="resetFab" onclick="resetCurrent()">↺ Reset This Practice</button>
<button class="assist-toggle" id="assistToggle" onclick="toggleAssistDrawer()">🧭 Assistant</button>
<script>
/* ===== DATA — Practice D1P1: 5 bài (Cam 17) — PART 1 ===== */

const TYPE_NAMES = [
  "Form · Note · Table · Flowchart · Summary Completion",
  "Sentence Completion",
  "Short Answer Questions",
  "Map · Plan · Diagram Labelling",
  "Multiple Choice",
  "Matching"
];

const PRACTICE_TITLES = {
  d1p1: "Cam 17 · Note & Table Completion"
};

/* ---------- Bài 1: Cam 17, Test 1, Part 1 ---------- */
const BAI_D1P1B1 = {
  id: "d1p1b1",
  title: "Bài 1 · Cam 17, Test 1, Part 1 — Buckworth Conservation Group",
  minutes: 15,
  groups: [
    { instruction: "Questions 1–10. Complete the notes below. Write ONE WORD AND/OR A NUMBER for each answer.", from: 1, to: 10,
      body: `<b>Buckworth Conservation Group</b><br><br>
<u>Regular activities</u><br>
<i>Beach</i><br>
● making sure the beach does not have {{1}} on it<br>
● no {{2}}<br><br>
<i>Nature reserve</i><br>
● maintaining paths<br>
● nesting boxes for birds installed<br>
● next task is taking action to attract {{3}} to the place<br>
● identifying types of {{4}}<br>
● building a new {{5}}<br><br>
<u>Forthcoming events</u><br>
<i>Saturday</i><br>
● meet at Dunsmore Beach car park<br>
● walk across the sands and reach the {{6}}<br>
● take a picnic<br>
● wear appropriate {{7}}<br><br>
<i>Woodwork session</i><br>

  transcript: [
    { en: "Labyrinths have existed for well over 4,000 years. Labyrinths and labyrinthine symbols have been found in regions as diverse as modern-day Turkey, Ireland, Greece, and India. There are various designs of labyrinth but what they all have in common is a winding spiral path which leads to a central area. There is one starting point at the entrance and the goal is to reach the central area. Finding your way through a labyrinth involves many twists and turns, but it's not possible to get lost as there is only one single path.",
      vi: "Mê lộ (đường một lối) đã tồn tại từ hơn 4.000 năm trước. Mê lộ và các biểu tượng hình mê lộ đã được tìm thấy ở nhiều khu vực đa dạng như Thổ Nhĩ Kỳ, Ireland, Hy Lạp và Ấn Độ ngày nay. Có nhiều thiết kế mê lộ khác nhau, nhưng điểm chung của chúng là đều có một con đường xoắn ốc uốn lượn dẫn đến khu vực trung tâm. Chỉ có một điểm bắt đầu duy nhất ở lối vào và mục tiêu là đi đến được khu vực trung tâm. Việc tìm đường đi qua một mê lộ đòi hỏi nhiều khúc cua và ngã rẽ, nhưng bạn không thể bị lạc vì chỉ có một con đường duy nhất." },
    { en: "In modern times, the word labyrinth has taken on a different meaning and is often used as a synonym for a maze. <span class='ev' id='d1p1b2-ev-q31'>A maze is quite different as it is a kind of puzzle</span> with an intricate network of paths. Mazes became fashionable in the 15th and 16th centuries in Europe, and can still be found in the gardens of great houses and palaces. The paths are usually surrounded by thick, high hedges so that it's not possible to see over them. Entering a maze usually involves getting lost a few times <span class='ev' id='d1p1b2-ev-q32'>before using logic to work out the pattern</span> and find your way to the centre and then out again. There are lots of dead ends and paths which lead you back to where you started. The word 'maze' is believed to <span class='ev' id='d1p1b2-ev-q33'>come from a Scandinavian word for a state of confusion</span>. This is where the word 'amazing' comes from.",
      vi: "Trong thời kỳ hiện đại, từ 'labyrinth' đã mang một ý nghĩa khác và thường được dùng như một từ đồng nghĩa với từ 'maze' (mê cung). Một mê cung thì khá khác biệt vì nó là một dạng trò chơi câu đố (Q31) với một mạng lưới đường đi phức tạp. Mê cung trở nên thịnh hành vào thế kỷ 15 và 16 ở Châu Âu, và ngày nay vẫn có thể được tìm thấy trong vườn của các dinh thự và cung điện lớn. Các lối đi thường được bao quanh bởi những hàng rào cây cao và dày đến mức không thể nhìn qua được. Việc đi vào một mê cung thường khiến bạn bị lạc vài lần trước khi phải dùng tư duy logic để tìm ra quy luật (Q32), từ đó tìm đường đến trung tâm rồi lại đi ra ngoài. Có rất nhiều ngõ cụt và những con đường dẫn bạn quay trở lại điểm xuất phát. Từ 'maze' được cho là bắt nguồn từ một từ vùng Scandinavia có nghĩa là trạng thái bối rối/nhầm lẫn (Q33). Đây cũng là nguồn gốc của từ 'amazing'." },
    { en: "Labyrinths, on the other hand, have a very different function. Although people now often refer to things they find complicated as labyrinths, this is not how they were seen in the past. The winding spiral of the labyrinth has been used for centuries as a metaphor for life's journey. It served as a spiritual reminder that there is purpose and meaning to our lives and helped to give people a sense of direction. Labyrinths are thought to encourage a feeling of calm and have been <span class='ev' id='d1p1b2-ev-q34'>used as a meditation and prayer tool in many cultures</span> over many centuries.",
      vi: "Mặt khác, mê lộ lại có một chức năng rất khác biệt. Mặc dù ngày nay mọi người thường gọi những thứ phức tạp là 'labyrinths', nhưng đây không phải là cách chúng được nhìn nhận trong quá khứ. Đường xoắn ốc uốn lượn của mê lộ đã được sử dụng trong nhiều thế kỷ như một phép ẩn dụ cho hành trình cuộc đời. Nó đóng vai trò như một lời nhắc nhở tâm linh rằng cuộc sống của chúng ta có mục đích, ý nghĩa và giúp con người có được cảm giác về định hướng. Mê lộ được cho là giúp thúc đẩy cảm giác bình yên và đã được sử dụng như một công cụ thiền định và cầu nguyện (Q34) trong nhiều nền văn hóa qua nhiều thế kỷ." },
    { en: "The earliest examples of the labyrinth spiral pattern have been <span class='ev' id='d1p1b2-ev-q35'>found carved into stone</span>, from Sardinia to Scandinavia, from Arizona to India to Africa. In Europe, these spiral carvings date from the late Bronze Age. The Native American Pima tribe wove baskets with a circular labyrinth design that depicted their own cosmology. In Ancient Greece, <span class='ev' id='d1p1b2-ev-q36'>the labyrinth spiral was used on coins around four thousand years ago</span>. Labyrinths made of mosaics were commonly found in bathhouses, villas and tombs throughout the Roman Empire.",
      vi: "Những ví dụ sớm nhất về họa tiết xoắn ốc của mê lộ đã được tìm thấy dưới dạng khắc vào đá (Q35), từ Sardinia đến Scandinavia, từ Arizona đến Ấn Độ và cả Châu Phi. Ở Châu Âu, những hình khắc xoắn ốc này có niên đại từ cuối thời kỳ Đồ đồng. Bộ tộc Pima da đỏ bản địa Mỹ đã dệt những chiếc giỏ có thiết kế mê lộ tròn để mô tả vũ trụ quan của riêng họ. Ở Hy Lạp cổ đại, hình xoắn ốc mê lộ đã được sử dụng trên các đồng tiền xu (Q36) từ khoảng bốn nghìn năm trước. Các mê lộ làm bằng tranh khảm thường được tìm thấy trong các nhà tắm công cộng, biệt thự và lăng mộ khắp Đế chế La Mã." },
    { en: "In Northern Europe, there were actual physical labyrinths designed for walking on. These were cut into the turf or grass, usually in a circular pattern. The origin of these walking labyrinths remains unclear, but they were probably used for fertility rites which may date back thousands of years. Eleven examples of turf labyrinths survive today, including the largest one at Saffron Walden, England, <span class='ev' id='d1p1b2-ev-q37'>which used to have a large tree in the middle of it</span>.",
      vi: "Ở Bắc Âu, từng có những mê lộ vật lý thực sự được thiết kế để mọi người đi bộ lên đó. Chúng được cắt sâu vào lớp đất cỏ hoặc thảm cỏ, thường theo hình tròn. Nguồn gốc của những mê lộ đi bộ này vẫn chưa rõ ràng, nhưng chúng có lẽ đã được sử dụng cho các nghi lễ phồn thực có niên đại từ hàng ngàn năm trước. Mười một nguyên mẫu mê lộ trên thảm cỏ vẫn còn tồn tại đến ngày nay, bao gồm cả cái lớn nhất tại Saffron Walden, Anh, nơi từng có một cây cổ thụ lớn ở chính giữa (Q37)." },
    { en: "More recently labyrinths have experienced something of a revival. Some believe that walking a labyrinth promotes healing and mindfulness, and there are those who believe in its emotional and physical benefits, <span class='ev' id='d1p1b2-ev-q38'>which include slower breathing</span> and a restored sense of balance and perspective. This idea has become so popular that labyrinths have been laid into the floors of spas, wellness centres and even prisons in recent years.",
      vi: "Gần đây, mê lộ đang trải qua một sự hồi sinh mạnh mẽ. Một số người tin rằng đi bộ trong mê lộ giúp thúc đẩy sự chữa lành và chánh niệm, và cũng có những người tin vào các lợi ích về mặt thể chất lẫn cảm xúc của nó, bao gồm nhịp thở chậm hơn (Q38) cùng cảm giác cân bằng và góc nhìn cuộc sống được khôi phục. Ý tưởng này đã trở nên phổ biến đến mức trong những năm gần đây, các mê lộ đã được lát ngay trên sàn của các spa, trung tâm chăm sóc sức khỏe và thậm chí cả trong các nhà tù." },
    { en: "A pamphlet at Colorado Children's Hospital informs patients that 'walking a labyrinth can often calm people in the midst of a crisis'. And apparently, it's not only patients who benefit. Many visitors find walking a labyrinth less stressful than sitting in a corridor or waiting room. Some doctors even walk the labyrinth during their breaks. In some hospitals, patients who can't walk <span class='ev' id='d1p1b2-ev-q39'>can have a paper 'finger labyrinth' brought to their bed</span>. The science behind the theory is a little sketchy, but there are dozens of small-scale studies which support claims about the benefits of labyrinths. For example, one study found that walking a labyrinth <span class='ev' id='d1p1b2-ev-q40'>provided 'short-term calming, relaxation, and relief from anxiety' for Alzheimer's patients</span>.",
      vi: "Một cuốn tờ rơi tại Bệnh viện Nhi đồng Colorado thông tin đến bệnh nhân rằng 'việc đi bộ trong mê lộ thường có thể giúp xoa dịu con người ngay giữa cơn khủng hoảng'. Và rõ ràng, không chỉ các bệnh nhân mới được hưởng lợi. Nhiều khách đến thăm nhận thấy việc đi bộ trong mê lộ ít căng thẳng hơn nhiều so với việc ngồi ở hành lang hoặc phòng chờ. Một số bác sĩ thậm chí còn đi bộ trong mê lộ trong giờ nghỉ của họ. Ở một số bệnh viện, những bệnh nhân không thể đi lại có thể được mang đến tận giường một chiếc 'mê lộ ngón tay' bằng giấy (Q39). Cơ sở khoa học đằng sau lý thuyết này còn hơi sơ sài, nhưng có hàng tá nghiên cứu quy mô nhỏ ủng hộ những tuyên bố về lợi ích của mê lộ. Ví dụ, một nghiên cứu cho thấy việc đi bộ trong mê lộ mang lại 'sự bình tĩnh ngắn hạn, thư giãn và giảm bớt lo âu' cho các bệnh nhân Alzheimer (Q40)." },

const AppState = { current:"overview", practices:{}, activeBai:{} };

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function st(uid){ if(!AppState.practices[uid]) AppState.practices[uid]={started:false,finished:false,score:0,ok:{},timerId:null,remaining:0,mapAns:{},selChip:null,retrying:{}}; return AppState.practices[uid]; }

const UNITS={}, UNIT_PARENT={};
Object.keys(PRACTICES).forEach(k=>{
  const P=PRACTICES[k];

  else { UNITS[k]=P; UNIT_PARENT[k]=k; }
});
function unit(id){return UNITS[id];}
function unitsOf(pid){const P=PRACTICES[pid];return P?(P.bais?P.bais.map(b=>b.id):[pid]):[];}
function practiceFinished(pid){const us=unitsOf(pid);return us.length>0&&us.every(u=>AppState.practices[u]&&AppState.practices[u].finished);}

}));

/* one bài block inside a multi-bài practice */
function renderUnit(u,active,dnum){

/* gate + workspace for any unit */
function unitBody(u){
  const mins=u.minutes||15;
  return `<div class="notice-bar" id="notice-${u.id}"></div>
    <div class="start-gate" id="gate-${u.id}">

function switchBai(pid,uid){
  AppState.activeBai[pid]=uid;
  const P=PRACTICES[pid];
  P.bais.forEach(b=>{
    document.getElementById("bai-"+b.id).classList.toggle("active",b.id===uid);
    document.getElementById("bt-"+b.id).classList.toggle("active",b.id===uid);
  });
  document.querySelectorAll("#page-"+pid+" .col-work,#page-"+pid+" .col-assist").forEach(c=>c.scrollTop=0);
}

function tokenize(html,P){
  return String(html).replace(/\{\{(\d+)\}\}/g,(m,n)=>
    `<span class="blank-num">${n}</span><input type="text" class="blank-input inline" id="in-${P.id}-q${n}" autocomplete="off" aria-label="Answer ${n}">`);
}

function renderGroups(P){
  let out="", usedBody=false, mapDone=false;
  (P.groups||[]).forEach(g=>{
    out+=`<div class="q-group-instruction">${esc(g.instruction)}</div>`;
    if(g.optionsBox) out+=`<div class="options-box">${g.optionsBox}</div>`;
    const qs=P.questions.filter(q=>q.id>=g.from&&q.id<=g.to);
    if(g.body){ out+=`<div class="body-block">${tokenize(g.body,P)}</div>`; }
    else if(!usedBody && P.body && qs.some(q=>q.type==="blank"&&!q.prompt)){
      out+=`<div class="body-block">${tokenize(P.body,P)}</div>`; usedBody=true;
    }
    if(!mapDone && P.map && qs.some(q=>q.type==="map")){ out+=renderMap(P); mapDone=true; }
    qs.forEach(q=>{ out+=renderQuestion(P,q); });
  });
  return out;
}

function renderQuestion(P,q){
  if(q.type==="map") return "";
  if(q.type==="blank"&&!q.prompt) return "";
  let input="";
  if(q.type==="mcq"){
    input=`<div class="mcq-options" role="radiogroup" data-qid="${q.id}" id="mcq-${P.id}-q${q.id}">`+
      q.choices.map(c=>`<div class="mcq-option" role="radio" aria-checked="false" tabindex="0"
        onclick="selectMCQ(this,'${P.id}',${q.id})" onkeydown="if(event.key==='Enter'||event.key===' ')selectMCQ(this,'${P.id}',${q.id})" data-val="${esc(c)}">${esc(c)}</div>`).join("")+`</div>`;
  } else if(q.type==="dropdown"){
    input=`<select class="q-dropdown" id="in-${P.id}-q${q.id}"><option value="">— choose —</option>`+
      q.choices.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join("")+`</select>`;
  } else {
    const hasTok=/\{\{\d+\}\}/.test(q.prompt||"");
    input=hasTok?"":`<input type="text" class="blank-input" id="in-${P.id}-q${q.id}" placeholder="Type your answer…" autocomplete="off">`;
  }
  return `<div class="q-card" id="qc-${P.id}-q${q.id}">
    <div class="q-head"><span class="q-num">${q.id}</span></div>
    ${q.prompt?`<div class="q-prompt">${tokenize(q.prompt,P)}</div>`:""}
    ${input}
  </div>`;
}

function renderMap(P){
  const m=P.map;
  const zones=m.zones.map(z=>`<div class="map-zone" id="zone-${P.id}-q${z.q}" style="left:${z.x}%;top:${z.y}%"
      onclick="tapZone('${P.id}',${z.q})" ondragover="event.preventDefault()" ondrop="dropZone(event,'${P.id}',${z.q})"
      tabindex="0" onkeydown="if(event.key==='Enter'||event.key===' ')tapZone('${P.id}',${z.q})">Q${z.q}</div>`).join("");
  const chips=m.labels.map((l,i)=>`<span class="label-chip" id="lc-${P.id}-${i}" draggable="true"
      ondragstart="dragLabel(event,'${P.id}',${i})" onclick="tapChip('${P.id}',${i})"
      tabindex="0" onkeydown="if(event.key==='Enter'||event.key===' ')tapChip('${P.id}',${i})">${esc(l)}</span>`).join("");
  return `<div class="label-bank" id="bank-${P.id}">${chips}</div>
    <div class="map-wrap"><img src="${m.image}" alt="${esc(P.title)} map">${zones}</div>`;
}

function renderTranscript(P){
  if(!P.transcript) return "";
  return `<div class="transcript-sec" id="ts-${P.id}">
    <div class="col-head"><h3>📜 Transcript</h3>
      <button class="btn btn-sm btn-outline" id="tsvi-${P.id}" onclick="toggleTsVI('${P.id}')">🇻🇳 Hiện bản dịch</button></div>
    ${P.transcript.map(t=>`<div class="ts-turn">
      ${t.speaker?`<div class="ts-speaker">${esc(t.speaker)}</div>`:""}
      <div class="ts-en">${t.en}</div>
      ${t.vi?`<div class="ts-vi">${esc(t.vi)}</div>`:""}
    </div>`).join("")}
  </div>`;
}

/* ===== LEARNING ASSISTANT ===== */
const MID_TABS={prediction:"Prediction",mapTips:"Map Tips",preview:"Preview",strategy:"Strategy"};

function renderAssist(P){
  const a=P.assist||{};
  const midKey=Object.keys(MID_TABS).find(k=>a[k]&&a[k].length);
  let tabs=`<button class="tab-btn active" id="tb-${P.id}-hint" onclick="switchTab('${P.id}','hint')">🎯 Hint</button>`;
  if(midKey) tabs+=`<button class="tab-btn" id="tb-${P.id}-mid" onclick="switchTab('${P.id}','mid')">${MID_TABS[midKey]}</button>`;
  if(a.vocab&&a.vocab.length) tabs+=`<button class="tab-btn" id="tb-${P.id}-vocab" onclick="switchTab('${P.id}','vocab')">📚 Vocabulary</button>`;
  tabs+=`<button class="tab-btn" id="tb-${P.id}-review" onclick="switchTab('${P.id}','review')" style="display:none">✅ Review</button>`;

  const hintPane=`<div class="tab-pane active" id="pane-${P.id}-hint">
    <div class="hint-note">Hints tell you WHAT to listen for and WHAT form to expect — never the answer.</div>
    ${P.questions.map(q=>`<div class="hint-card"><span class="q-num">${q.id}</span>
      <div><div class="hint-listen">Listen carefully for</div>
      <ul>${(q.hint&&q.hint.listen?q.hint.listen:[]).map(x=>`<li>${esc(x)}</li>`).join("")}</ul>
      ${q.hint&&q.hint.chip?`<span class="hint-chip">${esc(q.hint.chip)}</span>`:""}</div></div>`).join("")}
  </div>`;
  const midPane=midKey?`<div class="tab-pane" id="pane-${P.id}-mid">
    <div class="assist-list">${a[midKey].map(x=>`<div class="a-item">${esc(x)}</div>`).join("")}</div></div>`:"";
  const vocabPane=(a.vocab&&a.vocab.length)?`<div class="tab-pane" id="pane-${P.id}-vocab">
    <div class="hint-note" id="vnote-${P.id}">Words in this recording — theme vocabulary, no answers.</div>
    ${a.vocab.map(v=>`<div class="vocab-card"><b>${esc(v.w)}</b>${v.ipa?`<span class="ipa">${esc(v.ipa)}</span>`:""}
      ${v.vi?`<div class="vi">${esc(v.vi)}</div>`:""}</div>`).join("")}</div>`:"";
  return `<div class="tabbar" id="tabs-${P.id}">${tabs}</div>
    ${hintPane}${midPane}${vocabPane}
    <div class="tab-pane" id="pane-${P.id}-review"></div>`;
}

function switchTab(uid,key){
  const tb=document.getElementById("tabs-"+uid);
  tb.querySelectorAll(".tab-btn").forEach(b=>b.classList.toggle("active",b.id==="tb-"+uid+"-"+key));
  ["hint","mid","vocab","review"].forEach(k=>{
    const p=document.getElementById("pane-"+uid+"-"+k);
    if(p)p.classList.toggle("active",k===key);
  });
}

/* ===== NAVIGATION ===== */
function go(pageId){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  const el=document.getElementById("page-"+pageId); if(el)el.classList.add("active");
  document.querySelectorAll(".nav-item,.nav-home").forEach(n=>n.classList.toggle("active",n.dataset.page===pageId));
  AppState.current=pageId;
  document.getElementById("resetFab").classList.toggle("show", pageId!=="overview" && !!PRACTICES[pageId]);
  document.querySelectorAll(".col-work,.col-assist").forEach(c=>c.scrollTop=0);
  window.scrollTo(0,0);
  const uid=activeUnitOf(pageId);
  const s=uid?AppState.practices[uid]:null;
  document.getElementById("assistToggle").style.display =
    (uid&&s&&s.started&&window.innerWidth<=1280)?"block":"none";
}
function activeUnitOf(pid){
  if(!PRACTICES[pid])return null;
  return PRACTICES[pid].bais?(AppState.activeBai[pid]||PRACTICES[pid].bais[0].id):pid;
}

/* ===== START GATE + TIMER (per unit) ===== */
function startPractice(uid){
  const s=st(uid); if(s.started)return;
  s.started=true;
  document.getElementById("gate-"+uid).style.display="none";
  document.getElementById("ws-"+uid).style.display="grid";
  document.getElementById("submit-"+uid).style.display="inline-block";
  startTimer(uid);
  if(window.innerWidth<=1280)document.getElementById("assistToggle").style.display="block";
}
function fmt(sec){const m=Math.floor(sec/60),s=sec%60;return String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");}
function startTimer(uid){
  const P=unit(uid), s=st(uid);
  s.remaining=(P.minutes||15)*60;
  const chip=document.getElementById("timer-"+uid);
  chip.textContent="⏱ "+fmt(s.remaining); chip.classList.add("show");
  s.timerId=setInterval(()=>{
    s.remaining--;
    chip.textContent="⏱ "+fmt(Math.max(0,s.remaining));
    if(s.remaining<=120)chip.classList.add("warn");
    if(s.remaining<=0){ stopTimer(uid); doSubmit(uid,true); }
  },1000);
}
function stopTimer(uid){const s=st(uid); if(s.timerId){clearInterval(s.timerId);s.timerId=null;}}

/* ===== INPUT INTERACTION ===== */
function selectMCQ(el,uid,qid){
  const s=st(uid);
  if(s.finished && !s.retrying[qid])return;
  const box=el.parentElement;
  box.querySelectorAll(".mcq-option").forEach(o=>{o.classList.remove("selected");o.setAttribute("aria-checked","false");});
  el.classList.add("selected");el.setAttribute("aria-checked","true");
}
function hasRetrying(s){return Object.keys(s.retrying).length>0;}
function dragLabel(ev,uid,idx){
  const s=st(uid);
  if(s.finished&&!hasRetrying(s)){ev.preventDefault();return;}
  ev.dataTransfer.setData("text/plain",String(idx));
}
function dropZone(ev,uid,qid){
  ev.preventDefault();
  const idx=parseInt(ev.dataTransfer.getData("text/plain"),10);
  if(!isNaN(idx))assignLabel(uid,qid,idx);
}
function tapChip(uid,idx){
  const s=st(uid);
  if(s.finished&&!hasRetrying(s))return;
  const chip=document.getElementById("lc-"+uid+"-"+idx);
  if(chip.classList.contains("used"))return;
  const was=s.selChip===idx;
  s.selChip=was?null:idx;
  document.querySelectorAll("#bank-"+uid+" .label-chip").forEach(c=>c.classList.remove("selected"));
  if(!was)chip.classList.add("selected");
}
function tapZone(uid,qid){
  const s=st(uid);
  if(s.finished && !s.retrying[qid])return;
  if(s.selChip!==null){ assignLabel(uid,qid,s.selChip); s.selChip=null;
    document.querySelectorAll("#bank-"+uid+" .label-chip").forEach(c=>c.classList.remove("selected"));
  } else if(s.mapAns[qid]!==undefined){ unassignLabel(uid,qid); }
}
function assignLabel(uid,qid,idx){
  const s=st(uid), P=unit(uid);
  if(s.finished && !s.retrying[qid])return;
  const holder=Object.keys(s.mapAns).find(q=>s.mapAns[q]===idx);
  if(holder!==undefined){
    if(s.finished)return;
    unassignLabel(uid,parseInt(holder,10));
  }
  if(s.mapAns[qid]!==undefined)unassignLabel(uid,qid);
  s.mapAns[qid]=idx;
  const z=document.getElementById("zone-"+uid+"-q"+qid);
  z.textContent=P.map.labels[idx]; z.classList.add("filled");
  document.getElementById("lc-"+uid+"-"+idx).classList.add("used");
}
function unassignLabel(uid,qid){
  const s=st(uid);
  const idx=s.mapAns[qid]; if(idx===undefined)return;
  delete s.mapAns[qid];
  const z=document.getElementById("zone-"+uid+"-q"+qid);
  z.textContent="Q"+qid; z.classList.remove("filled");
  document.getElementById("lc-"+uid+"-"+idx).classList.remove("used");
}

/* ===== ANSWERS + GRADING ===== */
function getAnswer(P,q){
  const s=st(P.id);
  if(q.type==="mcq"){const sel=document.querySelector("#mcq-"+P.id+"-q"+q.id+" .selected");return sel?sel.dataset.val:"";}
  if(q.type==="map"){const idx=s.mapAns[q.id];return idx===undefined?"":P.map.labels[idx];}
  const el=document.getElementById("in-"+P.id+"-q"+q.id);return el?el.value:"";
}
function norm(x){return String(x).toLowerCase().trim().replace(/[.,;]/g,"").replace(/\s+/g," ");}
function isCorrect(q,val){
  if(Array.isArray(q.answer))return q.answer.some(a=>norm(a)===norm(val));
  return norm(q.answer)===norm(val);
}
function displayAnswer(q){return q.display||(Array.isArray(q.answer)?q.answer[0]:q.answer);}

/* ===== SUBMIT FLOW ===== */
function trySubmit(uid){
  const P=unit(uid);
  const un=P.questions.filter(q=>!getAnswer(P,q)).length;
  if(un>0){
    const nb=document.getElementById("notice-"+uid);
    nb.innerHTML=`<span>${un} câu chưa trả lời — Submit anyway?</span>
      <button class="btn btn-sm btn-primary" onclick="doSubmit('${uid}',false)">Submit</button>
      <button class="btn btn-sm btn-outline" onclick="hideNotice('${uid}')">Keep working</button>`;
    nb.classList.add("show");
  } else doSubmit(uid,false);
}
function hideNotice(uid){const nb=document.getElementById("notice-"+uid);nb.classList.remove("show");nb.innerHTML="";}

function markQuestion(P,q,ok){
  if(q.type==="mcq"){
    const box=document.getElementById("mcq-"+P.id+"-q"+q.id);
    box.querySelectorAll(".mcq-option").forEach(o=>{
      o.classList.remove("correct","incorrect");
      if(isCorrect(q,o.dataset.val))o.classList.add("correct");
      else if(o.classList.contains("selected"))o.classList.add("incorrect");
    });
  } else if(q.type==="map"){
    const z=document.getElementById("zone-"+P.id+"-q"+q.id);
    z.classList.remove("correct","incorrect");
    z.classList.add(ok?"correct":"incorrect");
  } else {
    const el=document.getElementById("in-"+P.id+"-q"+q.id);
    el.disabled=true; el.classList.remove("correct","incorrect");
    el.classList.add(ok?"correct":"incorrect");
  }
}

function doSubmit(uid,auto){
  hideNotice(uid);
  const P=unit(uid), s=st(uid);
  if(s.finished)return;
  stopTimer(uid);
  s.finished=true; s.retrying={}; s.selChip=null;
  document.querySelectorAll("#bank-"+uid+" .label-chip").forEach(c=>c.classList.remove("selected"));
  let correct=0;
  P.questions.forEach(q=>{
    const val=getAnswer(P,q); const ok=!!val&&isCorrect(q,val);
    s.ok[q.id]=ok; if(ok)correct++;
    markQuestion(P,q,ok);
  });
  s.score=correct;
  const sc=document.getElementById("score-"+uid);
  sc.textContent=correct+" / "+P.questions.length; sc.classList.add("show");
  const sb=document.getElementById("submit-"+uid); sb.textContent="✓ Finished"; sb.disabled=true;
  if(auto){
    const nb=document.getElementById("notice-"+uid);
    nb.innerHTML=`<span>⏰ Time's up — your answers were submitted automatically.</span>
      <button class="btn btn-sm btn-outline" onclick="hideNotice('${uid}')">OK</button>`;
    nb.classList.add("show");
  }
  buildReview(uid);
  const ts=document.getElementById("ts-"+uid); if(ts)ts.classList.add("revealed");
  const hide=id=>{const e=document.getElementById(id);if(e)e.style.display="none";};
  hide("tb-"+uid+"-hint"); hide("tb-"+uid+"-mid");
  const tv=document.getElementById("tb-"+uid+"-vocab"); if(tv)tv.textContent="📚 Key Vocabulary";
  const vn=document.getElementById("vnote-"+uid); if(vn)vn.textContent="Key vocabulary from this recording.";
  const tr=document.getElementById("tb-"+uid+"-review"); tr.style.display="inline-block";
  switchTab(uid,"review");
  updatePracticeStatus(UNIT_PARENT[uid]);
  updateProgress();
}

/* practice-level status: nav ✓, overview chip, bài tab ✓ */
function updatePracticeStatus(pid){
  const P=PRACTICES[pid]; if(!P)return;
  const us=unitsOf(pid);
  const finCount=us.filter(u=>AppState.practices[u]&&AppState.practices[u].finished).length;
  const all=finCount===us.length;
  document.getElementById("done-"+pid).style.display=all?"inline":"none";
  const chip=document.getElementById("chip-"+pid);
  if(chip){
    chip.classList.toggle("done",all);
    const stEl=chip.querySelector(".st");
    if(us.length>1){
      stEl.textContent=finCount===0?"Ready":(all?"Done "+finCount+"/"+us.length+" bài":finCount+"/"+us.length+" bài");
    } else {
      const s=AppState.practices[pid];
      stEl.textContent=(s&&s.finished)?"Done "+s.score+"/"+P.questions.length:"Ready";
    }
  }
  if(P.bais){
    P.bais.forEach((b,i)=>{
      const bt=document.getElementById("bt-"+b.id);
      if(bt){
        const fin=AppState.practices[b.id]&&AppState.practices[b.id].finished;
        bt.textContent=bt.dataset.label+(fin?" ✓":"");
      }
    });
  }
}

/* ===== REVIEW + RETRY ===== */
function reviewCard(P,q){
  const s=st(P.id), ok=s.ok[q.id], val=getAnswer(P,q), r=q.review||{};
  return `<div class="review-card ${ok?"ok":"bad"}" id="rv-${P.id}-q${q.id}">
    <div class="rv-head"><span class="q-num">${q.id}</span>
      <span class="rv-verdict ${ok?"ok":"bad"}" id="vd-${P.id}-q${q.id}">${ok?"✅ Correct":"❌ Incorrect"}</span></div>
    <div class="rv-answers">
      <div class="rv-row"><span class="rv-lbl">Your answer</span><span class="rv-your ${ok?"neutral":""}" id="ya-${P.id}-q${q.id}">${esc(val||"(blank)")}</span></div>
      <div class="rv-row"><span class="rv-lbl">Correct</span><span class="rv-correct">${esc(displayAnswer(q))}</span></div>
    </div>
    ${r.quote?`<blockquote class="xp-quote">“${esc(r.quote)}”</blockquote>`:""}
    ${r.evId?`<button class="btn btn-sm btn-outline" onclick="jumpTo('${r.evId}')">📍 Show in transcript</button>`:""}
    ${r.en?`<div class="rv-en">${esc(r.en)}</div>`:""}
    ${r.vi?`<div class="rv-vi">${esc(r.vi)}</div>`:""}
    ${r.trap?`<div class="rv-trap">⚠ ${esc(r.trap)}</div>`:""}
    <button class="btn btn-sm btn-primary rv-retry" id="rt-${P.id}-q${q.id}" onclick="retryQ('${P.id}',${q.id})"
      style="display:${ok?"none":"inline-block"}">↻ Retry this Question</button>
    <button class="btn btn-sm btn-primary rv-retry" id="ck-${P.id}-q${q.id}" onclick="checkQ('${P.id}',${q.id})"
      style="display:none">✔ Check</button>
  </div>`;
}
function buildReview(uid){
  const P=unit(uid);
  document.getElementById("pane-"+uid+"-review").innerHTML=P.questions.map(q=>reviewCard(P,q)).join("");
}
function retryQ(uid,qid){
  const P=unit(uid), s=st(uid), q=P.questions.find(x=>x.id===qid);
  s.retrying[qid]=true;
  if(q.type==="map"){
    const z=document.getElementById("zone-"+uid+"-q"+qid);
    z.classList.remove("correct","incorrect");
    unassignLabel(uid,qid);
  } else if(q.type==="mcq"){
    document.getElementById("mcq-"+uid+"-q"+qid).querySelectorAll(".mcq-option")
      .forEach(o=>o.classList.remove("correct","incorrect"));
  } else {
    const el=document.getElementById("in-"+uid+"-q"+qid);
    el.disabled=false; el.classList.remove("correct","incorrect"); el.focus();
  }
  document.getElementById("vd-"+uid+"-q"+qid).textContent="✏️ Retrying…";
  document.getElementById("vd-"+uid+"-q"+qid).className="rv-verdict retrying";
  document.getElementById("rt-"+uid+"-q"+qid).style.display="none";
  document.getElementById("ck-"+uid+"-q"+qid).style.display="inline-block";
  const el=q.type==="map"
    ? document.getElementById("zone-"+uid+"-q"+qid)
    : document.getElementById("qc-"+uid+"-q"+qid) || document.getElementById("in-"+uid+"-q"+qid);
  if(el&&el.scrollIntoView)el.scrollIntoView({behavior:"smooth",block:"center"});
}
function checkQ(uid,qid){
  const P=unit(uid), s=st(uid), q=P.questions.find(x=>x.id===qid);
  const val=getAnswer(P,q); const ok=!!val&&isCorrect(q,val);
  s.ok[qid]=ok; delete s.retrying[qid];
  markQuestion(P,q,ok);
  const card=document.getElementById("rv-"+uid+"-q"+qid);
  card.className="review-card "+(ok?"ok":"bad");
  const vd=document.getElementById("vd-"+uid+"-q"+qid);
  vd.textContent=ok?"✅ Correct":"❌ Incorrect"; vd.className="rv-verdict "+(ok?"ok":"bad");
  const ya=document.getElementById("ya-"+uid+"-q"+qid);
  ya.textContent=val||"(blank)"; ya.className="rv-your "+(ok?"neutral":"");
  document.getElementById("ck-"+uid+"-q"+qid).style.display="none";
  document.getElementById("rt-"+uid+"-q"+qid).style.display=ok?"none":"inline-block";
  const correct=P.questions.filter(x=>s.ok[x.id]).length;
  s.score=correct;
  document.getElementById("score-"+uid).textContent=correct+" / "+P.questions.length;
  updatePracticeStatus(UNIT_PARENT[uid]);
}

/* ===== RESET (current bài of current practice) ===== */
function resetCurrent(){
  const pid=AppState.current; const P=PRACTICES[pid]; if(!P)return;
  if(P.bais){
    const uid=activeUnitOf(pid);
    const u=unit(uid);
    stopTimer(uid);
    delete AppState.practices[uid];
    const idx=P.bais.findIndex(b=>b.id===uid);
    const old=document.getElementById("bai-"+uid);
    const tmp=document.createElement("div");
    tmp.innerHTML=renderUnit(u,true,pid.match(/d(\d+)/)[1]);
    old.replaceWith(tmp.firstElementChild);
    updatePracticeStatus(pid);
    updateProgress();
    return;
  }
  stopTimer(pid);
  delete AppState.practices[pid];
  const meta={id:pid,num:parseInt(pid.match(/p(\d+)/)[1],10)};
  const old=document.getElementById("page-"+pid);
  const tmp=document.createElement("div");
  tmp.innerHTML=renderPracticePage(meta);
  const fresh=tmp.firstElementChild;
  old.replaceWith(fresh);
  fresh.classList.add("active");
  updatePracticeStatus(pid);
  updateProgress();
}

/* ===== PROGRESS ===== */
function updateProgress(){
  const done=Object.keys(PRACTICES).filter(practiceFinished).length;
  document.getElementById("progressFill").style.width=(done/90*100)+"%";
  document.getElementById("progressLabel").textContent=done+" / 90 finished";
  document.getElementById("ovDone").textContent=done;
  TYPES.forEach(t=>{
    const d=t.practices.filter(p=>practiceFinished(p.id)).length;
    const el=document.getElementById("tcount-"+t.n); if(el)el.textContent=d+" / 15 finished";
  });
}

/* ===== TRANSCRIPT VI / JUMP / DRAWER ===== */
function toggleTsVI(uid){
  const sec=document.getElementById("ts-"+uid);
  const btn=document.getElementById("tsvi-"+uid);
  const showing=sec.querySelector(".ts-vi.show");
  sec.querySelectorAll(".ts-vi").forEach(v=>v.classList.toggle("show",!showing));
  btn.textContent=showing?"🇻🇳 Hiện bản dịch":"🇻🇳 Ẩn bản dịch";
}
function jumpTo(evId){
  const el=document.getElementById(evId); if(!el)return;
  if(el.scrollIntoView)el.scrollIntoView({behavior:"smooth",block:"center"});
  el.classList.add("flash"); setTimeout(()=>el.classList.remove("flash"),2500);
}
function toggleAssistDrawer(){
  const uid=activeUnitOf(AppState.current);
  const a=uid?document.getElementById("assist-"+uid):null;
  if(a)a.classList.toggle("open");
}

buildAll();
